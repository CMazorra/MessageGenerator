version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: mgen_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  app:
    build: .
    container_name: mgen_app
    volumes:
      - .:/app
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434

  ollama-init:
    image: ollama/ollama:latest
    container_name: mgen_ollama_init
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: /bin/sh
    command: >
      -c "
      echo 'Esperando a que Ollama inicie...';
      sleep 10;
      echo 'Descargando Llama 3...';
      ollama pull llama3;
      echo 'Descargando Mistral...';
      ollama pull mistral;
      echo 'Descargando Phi-3...';
      ollama pull phi3;
      echo '¡Todos los modelos han sido descargados!'
      "

volumes:
  ollama_data: